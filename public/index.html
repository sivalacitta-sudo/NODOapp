<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人待办事项</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h1>个人待办事项</h1>
            <div class="tab-container">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>
            <form id="login-form" class="auth-form active">
                <div class="form-group">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
            </form>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" required placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" required placeholder="请输入密码">
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
            </form>
        </div>
        <div id="todo-section" style="display: none;">
            <div class="user-header">
                <span id="user-info"></span>
                <button id="logout-btn" class="btn btn-secondary">退出</button>
            </div>
            <div class="add-todo">
                <input type="text" id="todo-input" placeholder="添加新待办...">
                <button id="add-btn" class="btn btn-primary">添加</button>
            </div>
            <div class="stats">
                <span>共 <strong id="total-count">0</strong> 项</span>
                <span>已完成 <strong id="completed-count">0</strong> 项</span>
            </div>
            <ul id="todo-list"></ul>
        </div>
    </div>
    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
